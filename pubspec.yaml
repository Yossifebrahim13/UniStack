name: UniStack
description: college community app
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  gap: ^3.0.1
  get: ^4.7.3

  # Lottie
  lottie: ^2.5.0

  # Firebase
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  cloud_firestore: ^6.1.3
  firebase_storage: ^13.1.0

  # Google Sign In
  google_sign_in: ^7.2.0

  # Local Storage
  shared_preferences: ^2.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.1

flutter:
  uses-material-design: true

  assets:
    - lib/core/assets/animations/
    - lib/core/assets/img/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "lib/core/assets/img/applogo.jpeg"

flutter_native_splash:
  color: "#ffffff"
  image: "lib/core/assets/img/applogo.jpeg"
  android_12:
    image: "lib/core/assets/img/applogo.jpeg"
    color: "#ffffff"
