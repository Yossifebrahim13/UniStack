name: UniStack
description: college community app
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  cloud_firestore: ^6.1.3
  connectivity_plus: ^7.0.0
  cupertino_icons: ^1.0.8
  firebase_auth: ^6.2.0
  firebase_core: ^4.5.0
  firebase_messaging: ^16.2.0
  firebase_storage: ^13.1.0
  flutter:
    sdk: flutter
  flutter_local_notifications: ^21.0.0
  flutter_offline: ^6.0.0
  gap: ^3.0.1
  get: ^4.7.3
  google_sign_in: ^6.2.1
  intl: ^0.20.2
  lottie: ^2.5.0
  shared_preferences: ^2.5.3
  skeletonizer: ^2.1.3

dev_dependencies:
  flutter_launcher_icons: ^0.13.1
  flutter_lints: ^5.0.0
  flutter_native_splash: ^2.4.1
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true

  assets:
    - lib/core/assets/animations/
    - lib/core/assets/img/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "lib/core/assets/img/applogo.jpeg"

flutter_native_splash:
  color: "#ffffff"
  image: "lib/core/assets/img/applogo.jpeg"
  android_12:
    image: "lib/core/assets/img/applogo.jpeg"
    color: "#ffffff"
