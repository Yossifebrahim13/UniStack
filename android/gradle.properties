# Gradle JVM tuning — 4G heap is sufficient for most Flutter projects.
# Increase to -Xmx6G only if you hit OutOfMemoryError during D8/R8.
org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=2G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8
# ─── Windows cross-drive fix ────────────────────────────────────────────────
# The Kotlin daemon's RelocatableFileToPathConverter crashes when source files
# (pub cache on C:\) and the project (E:\) are on different Windows drives.
# Disabling incremental Kotlin compilation eliminates the crash entirely.
kotlin.incremental=false

# Android settings
android.useAndroidX=true
android.enableJetifier=true

# Suppress "compileSdk N is not supported" warnings from plugins whose
# metadata hasn't caught up with API 36 yet.
android.suppressUnsupportedCompileSdk=36

# Prevent R class conflicts between Flutter plugins
android.nonTransitiveRClass=true

# Kotlin 2.x code style
kotlin.code.style=official

# Gradle daemon / configuration cache (speeds up subsequent builds)
org.gradle.daemon=true
org.gradle.parallel=true
org.gradle.caching=true